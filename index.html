const SUPA_KEY = 'sb_publishable_9Eke6ShVrrBelVuduK4Qhw_2O4uTMbt';
const supa = window.supabase ? window.supabase.createClient(SUPA_URL, SUPA_KEY) : null;
let session = null, syncStarted = false, dirty = false, pushTimer = null, lastStamp = null, channel = null;

function setSync(state, msg){
  const el = document.getElementById('syncDot');
  el.className = 'sync ' + state;
  el.textContent = {synced:'● synced', syncing:'↻ syncing', offline:'⚠ offline', local:'· local'}[state] || state;
  el.title = msg || '';
}
function scheduleSync(){
  if(!session || !supa) return;
  dirty = true; setSync('syncing');
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushNow, 1200);
}
async function pushNow(){
  if(!session || !dirty) return;
  const stamp = new Date().toISOString();
  const {error} = await supa.from('tracker_data')
    .upsert({user_id: session.user.id, data: db, updated_at: stamp});
  if(error){ setSync('offline', error.message); return; }
  dirty = false; lastStamp = stamp; setSync('synced');
}
window.addEventListener('online', ()=>{ if(dirty) pushNow(); });

async function initialSync(){
  setSync('syncing');
  const uid = session.user.id;
  const {data: row, error} = await supa.from('tracker_data').select('data,updated_at').maybeSingle();
  if(error){ setSync('offline', error.message); toast('Cloud error: '+error.message); return; }
  if(row && row.data && row.data.items){
    db = migrate(row.data);
    db.owner = uid;
    lastStamp = row.updated_at;
    saveLocalOnly();
    setSync('synced'); render();
  } else {
    // brand-new account: never inherit another user's cached data from this browser
    if(db.owner && db.owner !== uid){
      db = migrate({items: []});
      saveLocalOnly();
    }
    db.owner = uid;
    dirty = true; await pushNow(); render();
    if(!dirty) toast('First sync complete — your data is in the cloud ✓');
  }
  startRealtime();
}
function startRealtime(){
  if(channel) supa.removeChannel(channel);
  channel = supa.channel('tracker-sync')
    .on('postgres_changes',
      {event:'*', schema:'public', table:'tracker_data', filter:`user_id=eq.${session.user.id}`},
      payload=>{
        const row = payload.new;
        if(!row || !row.data || row.updated_at===lastStamp || dirty) return;
        db = migrate(row.data);
        lastStamp = row.updated_at;
        saveLocalOnly();
        render(); toast('⇣ Updated from another device');
      })
    .subscribe();
}

/* auth */
function updateGate(){
  document.getElementById('authGate').style.display = session ? 'none' : 'flex';
  document.getElementById('app').style.display = session ? '' : 'none';
}
async function doAuth(mode){
  const email = document.getElementById('authEmail').value.trim();
  const pw = document.getElementById('authPw').value;
  const err = document.getElementById('authErr');
  err.textContent = '';
  if(!email || !pw){ err.textContent = 'Email and password, both.'; return; }
  const {data, error} = mode==='in'
    ? await supa.auth.signInWithPassword({email, password: pw})
    : await supa.auth.signUp({email, password: pw});
  if(error){ err.textContent = error.message; return; }
  if(mode==='up' && !data.session){
    err.textContent = 'Account created — check your email for a confirmation link, then sign in.';
  }
}
document.getElementById('authIn').onclick = ()=>doAuth('in');
document.getElementById('authUp').onclick = ()=>doAuth('up');
document.getElementById('authPw').addEventListener('keydown', e=>{ if(e.key==='Enter') doAuth('in'); });
document.getElementById('signOut').onclick = async ()=>{
  if(supa) await supa.auth.signOut();
  toast('Signed out');
};

/* ===== go ===== */
const h0 = location.hash.slice(1);
if(TABS.some(([k])=>k===h0)) tab = h0;
try{ history.replaceState({tab, bNode:null, reviewStep:1}, '', '#'+tab); }catch(e){}
initCapture();
render();
setSync('local');
if(!supa){
  document.getElementById('authGate').style.display = 'none';
  setSync('offline', 'Sync library failed to load — running local-only');
} else {
  supa.auth.onAuthStateChange((event, s)=>{
    session = s;
    updateGate();
    if(s && !syncStarted){ syncStarted = true; initialSync(); }
    if(event==='SIGNED_OUT'){ syncStarted = false; setSync('local'); }
  });
  supa.auth.getSession().then(({data:{session:s}})=>{
    session = s;
    updateGate();
    if(s && !syncStarted){ syncStarted = true; initialSync(); }
  });
}
</script>
