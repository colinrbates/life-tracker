name: Supabase keep-alive

# Free-tier Supabase pauses projects after ~7 days without DATABASE
# activity — service health checks don't count. This calls a tiny RPC
# that writes a timestamp to public.heartbeat, so the database itself
# registers activity daily. The key is the publishable (public) one.

on:
  schedule:
    - cron: "0 8 * * *" # daily, 08:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write heartbeat via RPC
        run: |
          beat=$(curl -sf -X POST \
            -H "apikey: sb_publishable_9Eke6ShVrrBelVuduK4Qhw_2O4uTMbt" \
            -H "Content-Type: application/json" -d '{}' \
            "https://lhpriysnnnyuyrdlstdm.supabase.co/rest/v1/rpc/keepalive")
          echo "Heartbeat written: $beat"
